---
bracketSameLine: true
printWidth: 120
tabWidth: 2
useTabs: false
semi: false
singleQuote: true
trailingComma: none
bracketSpacing: true
arrowParens: avoid
htmlWhitespaceSensitivity: 'ignore'
overrides:
  - files: '*.html'
    options:
      semi: true
      bracketSameLine: true
plugins:
  - prettier-plugin-organize-attributes
  - prettier-plugin-organize-imports
  - prettier-plugin-tailwindcss" # Needs to be at end of the list